# Local one-command boot for the INDICO OTT integration stack.
#
# Usage:
#   docker compose up --build
#   open http://localhost:5173
#
# Notes:
# - The frontend is built as a static bundle and served by nginx. Because
#   Vite inlines `VITE_*` vars at build time, we pass VITE_API_BASE_URL as a
#   build arg, not a runtime env var.
# - The backend's FRONTEND_BASE_URL must match the public URL where the
#   frontend is served (used for activation links + CORS).

services:
  backend:
    build:
      context: ./backend
    image: indico-ott-backend:local
    container_name: indico-ott-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NETPLAY_BASE_URL: "https://ctazh5lrhe.execute-api.ap-southeast-3.amazonaws.com/dev/api"
      FRONTEND_BASE_URL: "http://localhost:5173"
      HTTP_TIMEOUT_MS: "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    image: indico-ott-frontend:local
    container_name: indico-ott-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
