# Local one-command boot for the INDICO OTT integration stack.
#
# Usage:
#   docker compose up --build
#   open http://localhost:5173
#
# Notes:
# - The frontend is built as a static bundle and served by nginx. Because
#   Vite inlines `VITE_*` vars at build time, we pass VITE_API_BASE_URL as a
#   build arg, not a runtime env var.
# - The backend's FRONTEND_BASE_URL must match the public URL where the
#   frontend is served (used for activation links + CORS).

services:
  backend:
    build:
      context: ./backend
    image: indico-ott-backend:local
    container_name: indico-ott-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NETPLAY_BASE_URL: "https://ctazh5lrhe.execute-api.ap-southeast-3.amazonaws.com/dev/api"
      NETFLIX_BASE_URL: "https://api.netflix-partner.example.com/v1"
      DISNEYPLUS_BASE_URL: "https://api.disneyplus-partner.example.com"
      FRONTEND_BASE_URL: "http://localhost:5173"
      HTTP_TIMEOUT_MS: "5000"
    restart: unless-stopped

  # Opt-in NETPLAY mock used to exercise failure branches end-to-end.
  # Start with:  docker compose --profile mock up --build
  # Then point the backend at it by setting NETPLAY_BASE_URL=http://mockpartner:9999
  # (override via an .env file or `docker compose run -e ...`).
  # MODE controls what /activate returns: active|pending|failed|expired|unknown|http401|http500|timeout
  mockpartner:
    profiles: ["mock"]
    build:
      context: ./backend
      dockerfile: Dockerfile.mockpartner
    image: indico-ott-mockpartner:local
    container_name: indico-ott-mockpartner
    ports:
      - "9999:9999"
    environment:
      PORT: "9999"
      MODE: "${MOCK_MODE:-failed}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    image: indico-ott-frontend:local
    container_name: indico-ott-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
