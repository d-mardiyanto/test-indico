server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any client-side route
    # (e.g. /activation/<code>).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets.
    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
